<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Sistema Escolar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/login.css">
</head>
<body class="auth-body">

    <div class="container">
        <h1>Iniciar Sesión</h1>
        <p class="subtitulo">Ingresa el correo y contraseña de la cuenta que registraste.</p>

        <form id="loginForm" novalidate>
            <label for="correo">Correo electrónico</label>
            <input type="text" id="correo" placeholder="ejemplo@correo.com" autocomplete="username">
            <span class="error-msg" id="error-correo" style="display:none;">El formato del correo no es válido.</span>

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
            <span class="error-msg" id="error-password" style="display:none;">Contraseña incorrecta o formato inválido.</span>

            <button type="submit">Ingresar</button>

            <div class="error-general" id="error-general" style="display:none;"></div>
        </form>

        <p class="enlace-secundario">
            ¿No tienes una cuenta aún? <a href="registro.html">Regístrate aquí primero</a>
        </p>
    </div>

    <script src="js/utileria.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
